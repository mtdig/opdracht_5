# =============================================================================
#  GitHub Actions - Config-starter release
#  Bouwt binaries en publiceert een GitHub Release wanneer version.txt wijzigt
# =============================================================================

name: Release config-starter

on:
  push:
    branches: [main]
    paths:
      - config-starter/version.txt

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: config-starter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versie inlezen
        id: version
        run: echo "VERSION=$(cat version.txt)" >> "$GITHUB_OUTPUT"

      - name: Go installeren
        uses: actions/setup-go@v5
        with:
          go-version-file: config-starter/go.mod

      - name: Cross-compileer alle platformen
        run: make all

      - name: GitHub Release aanmaken
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Config-starter ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            config-starter/bin/*
