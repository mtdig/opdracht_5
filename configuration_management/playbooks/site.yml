---
# =============================================================================
#  Unified playbook – configureert BEIDE VMs vanuit één ansible-playbook run
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  Play 1 – Docker host (WordPress, MariaDB, Vaultwarden, Portainer, Tech Snake)
# ─────────────────────────────────────────────────────────────────────────────
- name: Docker host - WordPress, MariaDB, Vaultwarden, Portainer
  hosts: docker_host
  become: true
  gather_subset: min

  pre_tasks:
    - name: Overschrijf wp_domain met Azure publieke FQDN vanuit Terraform
      set_fact:
        wp_domain: "{{ tf_public_fqdn }}"
      when: tf_public_fqdn is defined and tf_public_fqdn | length > 0

    - name: Stel extern FQDN samen uit DNS-label en extern domein
      set_fact:
        external_fqdn: "{{ tf_public_fqdn.split('.')[0] }}.{{ external_domain }}"
      when:
        - external_domain | default('') | length > 0
        - tf_public_fqdn is defined and tf_public_fqdn | length > 0

    - name: Stel Vaultwarden FQDN samen (eigen subdomain via extern domein)
      set_fact:
        vaultwarden_fqdn: "{{ tf_public_fqdn.split('.')[0] }}-secrets.{{ external_domain }}"
      when:
        - enable_vaultwarden | default(false) | bool
        - external_domain | default('') | length > 0
        - tf_public_fqdn is defined and tf_public_fqdn | length > 0

    - name: Stel Portainer FQDN samen (eigen subdomain via extern domein)
      set_fact:
        portainer_fqdn: "{{ tf_public_fqdn.split('.')[0] }}-portainer.{{ external_domain }}"
      when:
        - external_domain | default('') | length > 0
        - tf_public_fqdn is defined and tf_public_fqdn | length > 0

    - name: Controleer dat wp_domain gedefinieerd is
      assert:
        that:
          - wp_domain is defined
          - wp_domain | length > 0
        fail_msg: >
          wp_domain is niet gedefinieerd! Zorg ervoor dat tf_public_fqdn
          wordt meegegeven via '-e tf_public_fqdn=...' of gebruik de Makefile.

  roles:
    - role: common
      vars:
        ufw_allow_ports:
          - "80/tcp"
          - "443/tcp"
    - docker_host
    - docker_compose
    - reverse_proxy
    - wp_cli
    - role: tech_snake
      when: enable_tech_snake | default(false) | bool

  post_tasks:
    - name: Toon verbindingsinformatie
      debug:
        msg:
          - "=========================================="
          - "Services beschikbaar op:"
          - "  WordPress:  https://{{ wp_domain }}"
          - "{{ '  WordPress:  https://' + external_fqdn if external_fqdn | default('') | length > 0 else '' }}"
          - "{{ '  Portainer:  https://' + portainer_fqdn if portainer_fqdn | default('') | length > 0 else '  Portainer:  https://' + wp_domain + ':9443' }}"
          - "{{ '  Vaultwarden:       https://' + vaultwarden_fqdn if (enable_vaultwarden | default(false) | bool and vaultwarden_fqdn | default('') | length > 0) else '' }}"
          - "{{ '  Vaultwarden Admin: https://' + vaultwarden_fqdn + '/admin' if (enable_vaultwarden | default(false) | bool and vaultwarden_fqdn | default('') | length > 0 and vaultwarden_admin_token | default('') | length > 0) else '' }}"
          - "{{ '  Vaultwarden Token: ' + vaultwarden_admin_token if (enable_vaultwarden | default(false) | bool and vaultwarden_admin_token | default('') | length > 0) else '' }}"
          - "{{ '  Tech Snake:        https://' + wp_domain + '/snake/' if (enable_tech_snake | default(false) | bool) else '' }}"
          - ""
          - "  Docker containers beheren via Portainer"
          - "  Portainer login: admin / {{ wp_admin_password }}"
          - "  MariaDB draait als container op 127.0.0.1:3306"
          - "=========================================="

# ─────────────────────────────────────────────────────────────────────────────
#  Play 2 – Luanti / VoxeLibre server (ARM64)
# ─────────────────────────────────────────────────────────────────────────────
- name: Luanti / VoxeLibre server (ARM64)
  hosts: luanti
  become: true
  gather_subset: min

  roles:
    - role: common
      vars:
        ufw_allow_ports:
          - "30000/udp"
          - "9001/tcp"
    - docker_host
    - luanti
    - portainer_agent

  post_tasks:
    - name: Toon verbindingsinformatie
      debug:
        msg:
          - "=========================================="
          - "Luanti / VoxeLibre server is klaar!"
          - ""
          - "  Server adres:  {{ ansible_host }}:30000"
          - "  DNS:           {{ luanti_public_fqdn | default(ansible_host) }}:30000"
          - ""
          - "  Verbind via Luanti/Minetest client:"
          - "    Adres: {{ luanti_public_fqdn | default(ansible_host) }}"
          - "    Poort: 30000"
          - ""
          - "  Portainer Agent draait op poort 9001"
          - "  SSH: ssh {{ luanti_ssh_host_alias | default('luanti') }}"
          - "=========================================="

# ─────────────────────────────────────────────────────────────────────────────
#  Play 3 – Luanti VM registreren als Portainer environment (via API)
# ─────────────────────────────────────────────────────────────────────────────
- name: Luanti registreren in Portainer
  hosts: docker_host
  become: true
  gather_facts: false
  tasks:
    - name: Wacht tot Portainer API beschikbaar is
      uri:
        url: http://127.0.0.1:9000/api/system/status
        method: GET
        status_code: [200]
      register: portainer_status
      until: portainer_status.status == 200
      retries: 10
      delay: 5

    - name: Controleer of Portainer al geconfigureerd is (admin bestaat)
      uri:
        url: http://127.0.0.1:9000/api/users/admin/check
        method: GET
        status_code: [204, 404]
      register: admin_check

    - name: Portainer admin gebruiker aanmaken (eerste keer)
      uri:
        url: http://127.0.0.1:9000/api/users/admin/init
        method: POST
        body_format: json
        body:
          Username: "admin"
          Password: "{{ wp_admin_password }}"
        status_code: [200]
      register: admin_init
      when: admin_check.status == 404

    - name: Inloggen op Portainer API
      uri:
        url: http://127.0.0.1:9000/api/auth
        method: POST
        body_format: json
        body:
          Username: "admin"
          Password: "{{ wp_admin_password }}"
        status_code: [200]
      register: portainer_auth

    - name: JWT token opslaan
      set_fact:
        portainer_token: "{{ portainer_auth.json.jwt }}"

    - name: Bestaande environments ophalen
      uri:
        url: http://127.0.0.1:9000/api/endpoints
        method: GET
        headers:
          Authorization: "Bearer {{ portainer_token }}"
        status_code: [200]
      register: portainer_endpoints

    - name: Controleer of Luanti environment al bestaat
      set_fact:
        luanti_endpoint_exists: "{{ portainer_endpoints.json | selectattr('Name', 'equalto', 'luanti') | list | length > 0 }}"
        local_endpoint_exists: "{{ portainer_endpoints.json | selectattr('Name', 'equalto', 'local') | list | length > 0 }}"

    - name: Lokale Docker omgeving registreren in Portainer
      uri:
        url: http://127.0.0.1:9000/api/endpoints
        method: POST
        headers:
          Authorization: "Bearer {{ portainer_token }}"
          Content-Type: "application/x-www-form-urlencoded"
        body_format: form-urlencoded
        body:
          Name: "local"
          EndpointCreationType: "1"
          URL: "unix:///var/run/docker.sock"
        status_code: [200, 201, 409]
      when: not local_endpoint_exists | bool

    - name: Luanti environment registreren in Portainer
      uri:
        url: http://127.0.0.1:9000/api/endpoints
        method: POST
        headers:
          Authorization: "Bearer {{ portainer_token }}"
          Content-Type: "application/x-www-form-urlencoded"
        body_format: form-urlencoded
        body:
          Name: "luanti"
          EndpointCreationType: "2"
          URL: "tcp://{{ luanti_private_ip }}:9001"
          TLS: "true"
          TLSSkipVerify: "true"
          TLSSkipClientVerify: "true"
          GroupID: "1"
        status_code: [200, 201, 409]
      when: not luanti_endpoint_exists | bool
      register: endpoint_create

    - name: Portainer Luanti environment status
      debug:
        msg: >-
          {{ 'Luanti environment succesvol geregistreerd in Portainer!'
             if (endpoint_create is defined and endpoint_create is not skipped)
             else 'Luanti environment bestond al in Portainer.' }}

# ─────────────────────────────────────────────────────────────────────────────
#  Play 4 – Lokale SSH config bijwerken (beide VMs)
# ─────────────────────────────────────────────────────────────────────────────
- name: Lokale SSH config bijwerken
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  vars:
    ssh_config_path: "{{ lookup('env', 'HOME') }}/.ssh/config"
  tasks:
    - name: Backup maken van SSH config
      copy:
        src: "{{ ssh_config_path }}"
        dest: "{{ ssh_config_path }}.bak"
        remote_src: true
        mode: "0600"
      when: ssh_config_path is file

    - name: SSH config bestand aanmaken als het niet bestaat
      file:
        path: "{{ ssh_config_path }}"
        state: touch
        mode: "0600"
      changed_when: false

    # Docker host SSH config
    - name: Bestaand azosboxes blok verwijderen
      blockinfile:
        path: "{{ ssh_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ ssh_host_alias }}"
        state: absent

    - name: SSH config blok voor Docker host toevoegen
      blockinfile:
        path: "{{ ssh_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ ssh_host_alias }}"
        block: |
          Host {{ ssh_host_alias }}
              HostName {{ hostvars[groups['docker_host'][0]]['ansible_host'] }}
              User {{ hostvars[groups['docker_host'][0]]['ansible_user'] | default('osboxes') }}
              IdentityFile {{ ssh_key }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null

    # Luanti SSH config
    - name: Bestaand Luanti blok verwijderen
      blockinfile:
        path: "{{ ssh_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ luanti_ssh_host_alias | default('luanti') }}"
        state: absent

    - name: SSH config blok voor Luanti toevoegen
      blockinfile:
        path: "{{ ssh_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ luanti_ssh_host_alias | default('luanti') }}"
        block: |
          Host {{ luanti_ssh_host_alias | default('luanti') }}
              HostName {{ hostvars[groups['luanti'][0]]['ansible_host'] }}
              User {{ hostvars[groups['luanti'][0]]['ansible_user'] | default('osboxes') }}
              IdentityFile {{ ssh_key }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
