---
# wp_cli - WordPress initiële configuratie via WP-CLI in de container

- name: WP-CLI downloaden naar host
  get_url:
    url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
    dest: /tmp/wp-cli.phar
    mode: "0755"

- name: WP-CLI in WordPress container kopiëren
  command: docker cp /tmp/wp-cli.phar wordpress:/usr/local/bin/wp
  changed_when: true

- name: WP-CLI uitvoerbaar maken in container
  command: docker exec wordpress chmod +x /usr/local/bin/wp
  changed_when: false

- name: Wacht tot WordPress container beschikbaar is
  uri:
    url: http://127.0.0.1:8080/wp-login.php
    status_code: [200, 302, 301]
    follow_redirects: none
  register: wp_ready
  until: wp_ready.status in [200, 302, 301]
  retries: 30
  delay: 5

- name: Controleer of WordPress al geïnstalleerd is
  command:
    cmd: docker exec wordpress wp core is-installed --path=/var/www/html --allow-root
  register: wp_installed
  changed_when: false
  failed_when: false

- name: WordPress installeren via WP-CLI in container
  command:
    cmd: >-
      docker exec wordpress wp core install
      --path=/var/www/html
      --url=https://{{ wp_domain }}
      --title="{{ wp_title }}"
      --admin_user={{ wp_admin_user }}
      --admin_password={{ wp_admin_password }}
      --admin_email={{ wp_admin_email }}
      --locale={{ wp_locale }}
      --allow-root
  when: wp_installed.rc != 0

- name: WordPress taal instellen
  command:
    cmd: docker exec wordpress wp language core install {{ wp_locale }} --activate --path=/var/www/html --allow-root
  register: wp_lang
  changed_when: "'already installed' not in wp_lang.stdout"

- name: Understrap theme installeren en activeren
  command:
    cmd: docker exec wordpress wp theme install understrap --activate --path=/var/www/html --allow-root
  register: wp_theme
  changed_when: "'already installed' not in wp_theme.stdout"

- name: Beveiligingsplugins installeren en activeren
  command:
    cmd: docker exec wordpress wp plugin install {{ item }} --activate --path=/var/www/html --allow-root
  loop:
    - wordfence
    - limit-login-attempts-reloaded
    - disable-xml-rpc-pingback
  register: wp_security_plugins
  changed_when: "'already installed' not in wp_security_plugins.stdout"
